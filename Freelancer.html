<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
     <style>
        body{
        background-color: rgb(203, 108, 124);
        color: whitesmoke;

        min-height: 100vh;

        display: flex;
        justify-content: center;
        align-items: center;
        }
        button
        {
            background-color: pink;
            border-radius: 8%;
            border-color: black;
            cursor:pointer;
            font-size: 20px;
        }
        button:hover
        {
            background-color: #f1f1f1;
        }
       .carousel-item{
        height:500px;
        }

        .carousel-item img{
        width:100%;
        height:100%;
        object-fit:cover;
        }
       .carousel-control-prev,
       .carousel-control-next{
        border: none !important;
        outline: none !important;
        box-shadow: none !important;
        background: transparent !important;
        }

        .carousel-control-prev:focus,
        .carousel-control-next:focus,
        .carousel-control-prev:active,
        .carousel-control-next:active{
        outline: none !important;
        box-shadow: none !important;
        background: transparent !important;
        }

        .carousel-control-prev-icon,
        .carousel-control-next-icon{
        filter: invert(1);
        }
     </style>
    <title>Slider Page</title>
</head>
<body>
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-6 p-5">
                <b><h1>Freelancer Designer</h1></b>
                <b><p>I help agencies & brands to turn their ideas into designs. My heart is creativity and design and my head has always been business led. Which to this day has served me very well!</p></b>
                <br>
                <b><p>Image form <a href="#">Freepik</a></p></b>
                <br>
                <button>CONTACT ME</button>
            </div>

            <div class="col-md-6 p-5">
                <div id="slider" class="carousel slide">
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img src="Image_1.jpg" class="d-block w-100">
                        </div>
                        <div class="carousel-item">
                            <img src="Image_2.jpg" class="d-block w-100">
                        </div>
                        <div class="carousel-item">
                            <img src="Image_3.jpg" class="d-block w-100">
                        </div>
                        <div class="carousel-item">
                            <img src="Image_4.jpg" class="d-block w-100">
                        </div>
                        <div class="carousel-item">
                            <img src="Image_5.jpg" class="d-block w-100">
                        </div>
                        
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#slider" data-bs-slide="prev">
                        <span class="carousel-control-prev-icon"></span>
                    </button>

                    <button class="carousel-control-next" type="button" data-bs-target="#slider" data-bs-slide="next">
                        <span class="carousel-control-next-icon"></span>
                    </button>
                </div>
            </div>
        </div>

    </div>




    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
